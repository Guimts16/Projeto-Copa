<div class="calendar-card card shadow-sm p-4 mb-4">
  <div
    class="d-flex flex-column flex-lg-row justify-content-between align-items-start align-items-lg-center mb-4 gap-3"
  >
    <div>
      <h4 class="mb-1">Calendário de jogos</h4>
      <p class="text-muted mb-0">Passe o mouse nos dias para ver os times escalados.</p>
    </div>
    <div class="btn-group">
      <button class="btn btn-outline-secondary" type="button" (click)="prevMonth()">
        Anterior
      </button>
      <button class="btn btn-outline-secondary" type="button" (click)="nextMonth()">Próximo</button>
    </div>
  </div>

  <div class="calendar-header mb-3">
    <strong>{{ monthName }}</strong>
  </div>

  <div class="calendar-grid">
    <div class="calendar-cell calendar-cell-header">Dom</div>
    <div class="calendar-cell calendar-cell-header">Seg</div>
    <div class="calendar-cell calendar-cell-header">Ter</div>
    <div class="calendar-cell calendar-cell-header">Qua</div>
    <div class="calendar-cell calendar-cell-header">Qui</div>
    <div class="calendar-cell calendar-cell-header">Sex</div>
    <div class="calendar-cell calendar-cell-header">Sáb</div>

    <ng-container *ngFor="let day of calendarDays()">
      <div
        class="calendar-cell day-cell"
        [class.empty]="!day.date"
        [class.has-match]="day.matches.length > 0"
      >
        <span class="day-label">{{ day.label }}</span>
        <div *ngIf="day.matches.length > 0" class="day-tooltip">
          <div class="badge bg-primary mb-2">{{ day.matches.length }} jogo(s)</div>
          <div *ngFor="let match of day.matches" class="tooltip-item">
            <strong>{{ match.opponent }}</strong>
            <div class="text-muted">{{ match.venue }}</div>
          </div>
        </div>
      </div>
    </ng-container>
  </div>

  <form [formGroup]="form" class="row g-3 mt-4">
    <div class="col-md-3">
      <label for="date" class="form-label">Data do jogo</label>
      <input id="date" type="date" class="form-control" formControlName="date" />
    </div>
    <div class="col-md-3">
      <label for="country" class="form-label">País</label>
      <select id="country" class="form-select" formControlName="country">
        <option value="">Selecione um país</option>
        <option *ngFor="let country of countries" [value]="country">{{ country }}</option>
      </select>
      <div
        *ngIf="form.get('country')?.touched && form.get('country')?.invalid"
        class="form-text text-danger"
      >
        País obrigatório.
      </div>
    </div>
    <div class="col-md-3">
      <label for="opponent" class="form-label">Adversário</label>
      <input
        id="opponent"
        type="text"
        class="form-control"
        formControlName="opponent"
        list="opponent-list"
      />
      <datalist id="opponent-list">
        <option *ngFor="let option of opponentOptions" [value]="option"></option>
      </datalist>
      <div
        *ngIf="form.get('opponent')?.touched && form.get('opponent')?.invalid"
        class="form-text text-danger"
      >
        Adversário obrigatório.
      </div>
    </div>
    <div class="col-md-3">
      <label for="venue" class="form-label">Local</label>
      <input id="venue" type="text" class="form-control" formControlName="venue" />
      <div
        *ngIf="form.get('venue')?.touched && form.get('venue')?.invalid"
        class="form-text text-danger"
      >
        Local obrigatório.
      </div>
    </div>

    <div class="col-12 d-flex justify-content-end">
      <button type="button" class="btn btn-primary" (click)="addMatch()">Salvar partida</button>
    </div>
  </form>
</div>
